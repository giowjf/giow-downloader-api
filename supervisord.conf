[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:bgutil]
# Servidor JS que gera PO Token automaticamente na porta 4416
# O plugin bgutil-ytdlp-pot-provider (Python) conecta o yt-dlp a este servidor
command=node /bgutil/server/build/main.js
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/bgutil.out.log
stderr_logfile=/var/log/supervisor/bgutil.err.log
startsecs=5
priority=1

[program:api]
command=gunicorn -b 0.0.0.0:5000 --timeout 180 --workers 2 app:app
directory=/app
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/api.out.log
stderr_logfile=/var/log/supervisor/api.err.log
startretries=5
priority=2

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
