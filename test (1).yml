name: Testes antes do deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar ffmpeg e Node.js
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências Python
        run: pip install "yt-dlp[default]" flask flask-cors "gunicorn[gevent]"

      - name: Rodar testes unitários
        run: python test_suite.py unit

      - name: Verificar sintaxe de todos os arquivos Python
        run: |
          python -m py_compile app.py
          python -m py_compile downloader.py
          echo "Sintaxe OK"
